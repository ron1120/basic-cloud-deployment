---
- name: Configure EC2 and Deploy Discord Bot
  hosts: app
  become: true

  vars:
    docker_image: "ronsss/discord-bot"
    docker_tag: "latest"
    container_name: "discord-bot"

  tasks:
    # ── System Updates ──
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist

    # ── Python Installation ──
    - name: Install Python and dependencies
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    # ── Docker Prerequisites ──
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    # ── Docker CE Installation ──
    - name: Download Docker install script
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"

    - name: Run Docker install script
      command: sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: true

    # ── Reset SSH connection to pick up docker group ──
    - name: Reset SSH connection
      meta: reset_connection

    # ── Pull and Run Bot ──
    - name: Pull Discord bot image
      become: false
      command: "docker pull {{ docker_image }}:latest"

    - name: Stop existing bot container
      become: false
      command: "docker rm -f {{ container_name }}"
      ignore_errors: true

    - name: Run Discord bot container
      become: false
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -e DISCORD_TOKEN={{ discord_token }}
        {{ docker_image }}:{{ docker_tag }}
